<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioEQ Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 12px;
      color: #F0A030;
    }
    audio-eq {
      width: 100%;
      height: 400px;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .panel {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .card {
      background: #262A33;
      padding: 12px 16px;
      border-radius: 6px;
      min-width: 200px;
      flex: 1;
    }
    .card h3 {
      font-size: 13px;
      color: #9098A8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card label {
      display: block;
      font-size: 12px;
      margin: 6px 0 2px;
      color: #b0b8c8;
    }
    .card input, .card select {
      width: 100%;
      padding: 4px 8px;
      background: #1a1a2e;
      border: 1px solid #3a3f4a;
      color: #e0e0e0;
      border-radius: 4px;
      font-size: 12px;
    }
    .card button {
      margin-top: 8px;
      padding: 4px 12px;
      background: #F0A030;
      border: none;
      color: #1a1a2e;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .card button:hover { background: #f0b050; }
    .band-row {
      display: grid;
      grid-template-columns: 30px 60px 50px 40px 70px 40px 30px;
      gap: 4px;
      align-items: center;
      font-size: 11px;
      margin: 2px 0;
    }
    .band-row span { color: #9098A8; }
    .band-row input { width: 100%; padding: 2px 4px; font-size: 11px; }
    .band-row button { padding: 2px 6px; font-size: 11px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AudioEQ Visualizer</h1>
    <audio-eq id="eq" curve-color="#F0A030" background-color="#262A33"></audio-eq>

    <div class="panel">
      <div class="card">
        <h3>Controls</h3>
        <label>Sample Rate</label>
        <select id="sampleRate">
          <option value="44100">44.1 kHz</option>
          <option value="48000" selected>48 kHz</option>
          <option value="96000">96 kHz</option>
          <option value="192000">192 kHz</option>
        </select>
        <label>Band Count</label>
        <input type="number" id="bandCount" value="5" min="0" max="20" style="width:80px">
        <button id="resetBtn">Reset to Defaults</button>
      </div>

      <div class="card">
        <h3>Focused Band</h3>
        <div id="focusedInfo" style="font-size:12px;color:#9098A8;">No band focused</div>
        <label>Frequency (Hz)</label>
        <input type="number" id="focusFreq" disabled>
        <label>Gain (dB)</label>
        <input type="number" id="focusGain" disabled>
        <label>Q</label>
        <input type="number" id="focusQ" step="0.1" disabled>
        <label>Type</label>
        <select id="focusType" disabled>
          <option value="peak">Peak</option>
          <option value="lowShelf">Low Shelf</option>
          <option value="highShelf">High Shelf</option>
          <option value="lowPass">Low Pass</option>
          <option value="highPass">High Pass</option>
        </select>
      </div>

      <div class="card">
        <h3>LPF / HPF</h3>
        <label><input type="checkbox" id="lpfEnabled"> LPF Enabled</label>
        <label>LPF Freq: <span id="lpfFreqLabel">20000</span> Hz</label>
        <input type="range" id="lpfFreq" min="20" max="20000" value="20000" style="width:100%">
        <label><input type="checkbox" id="hpfEnabled"> HPF Enabled</label>
        <label>HPF Freq: <span id="hpfFreqLabel">20</span> Hz</label>
        <input type="range" id="hpfFreq" min="20" max="20000" value="20" style="width:100%">
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <h3>Bands <button id="addBandBtn">+ Add Band</button></h3>
      <div id="bandsList"></div>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
